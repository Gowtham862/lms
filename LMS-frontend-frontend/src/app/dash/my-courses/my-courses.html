    <!-- ================= MY COURSES ================= -->
    <div class="courses-card">

      <div class="courses-header">
        <h3>My Courses</h3>

        <div class="tabs">
          <span [class.active]="activeTab==='all'" (click)="activeTab='all'">All</span>
          <span [class.active]="activeTab==='ongoing'" (click)="activeTab='ongoing'">Ongoing</span>
          <span [class.active]="activeTab==='completed'" (click)="activeTab='completed'">Completed</span>
        </div>
      </div>

      <div class="course-item" *ngFor="let course of filteredCourses()">

        <img [src]="course.image" class="course-img" />

        <div class="course-info">
          <h4>{{ course.title }}</h4>

          <div class="progress-wrapper">
            <span>{{ course.progress }}% Completed</span>
            <div class="progress-bar">
              <div class="fill" [style.width.%]="course.progress"></div>
            </div>
          </div>
        </div>

        <button class="action-btn" routerLink="/courses">
          {{ actionLabel(course.progress) }}
        </button>

      </div>

    </div>

  </div>

    <div class="attendance-card">

      <div class="attendance-header">
        <h3>Attendance %</h3>
        <button class="month-btn">Overall</button>
      </div>

      <div class="gauge-wrapper">

        <svg viewBox="0 0 200 120" class="gauge">

          <!-- background arc -->
          <path d="M20 100 A80 80 0 0 1 180 100" fill="none" stroke="#e5ecf6" stroke-width="14" />

          <!-- active arc -->
          <path d="M20 100 A80 80 0 0 1 180 100" fill="none" stroke="#0b3a82" stroke-width="14"
            [attr.stroke-dasharray]="dashArray" [attr.stroke-dashoffset]="dashOffset" />

          <!-- needle -->
          <line x1="100" y1="100" x2="100" y2="30" stroke="#0b3a82" stroke-width="4"
            [attr.transform]="'rotate(' + needleAngle + ' 100 100)'" />

          <circle cx="100" cy="100" r="6" fill="#0b3a82" />
        </svg>

        <div class="attendance-value">
          {{ attendancePercent }}%
          <p>Minimum 60% must be required to get the certificate.</p>
        </div>

      </div>

    </div>


  </div>

</div>
