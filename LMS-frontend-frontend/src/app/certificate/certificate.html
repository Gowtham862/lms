<h2 class="page-title">My Certificate</h2>

<div class="certificate-section-card">
    <div class="complted-wrapper">
<div class="completed-grid">

  <div
    class="completed-card"
    *ngFor="let c of completed; let i =index"
    [class.active]="i === 0">
    <img [src]="getCourseImage(c)" />

    <div class="card-body">
      <h3>{{ c.coursename }}</h3>

     <p class="meta">
              {{ getModuleCount(c) }} Modules · {{ c.courselevel }}
            </p>

     <p class="timeline">
              <span class="section-title">Course Timeline</span><br>
               Start Date : {{ c.batchStartDate }}<br>
      End Date : {{ c.batchEndDate }}
 
            </p>

      <button class="download-btn" (click)="downloadFile(c.courseId)">
        Download Certificate 
      </button>
    </div>
  </div>

</div>
</div>
</div>
